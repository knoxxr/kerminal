name: Release

# Tag a commit to build release artifacts for every platform and attach them
# to a draft GitHub Release, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: android
          - os: ubuntu-latest
            target: web
    runs-on: ${{ matrix.os }}
    # Cloud credentials baked into the build via --dart-define (see each build
    # step). Empty when the secrets are unset → the app runs local-only.
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Linux desktop build prerequisites (incl. libsecret for secure storage).
      - if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev

      - if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: flutter pub get
      - run: dart run build_runner build
      # Regenerate per-platform launcher icons from assets/icon/app_icon.png so
      # the released apps always carry the current icon (done in CI since the
      # generated icons aren't committed).
      - run: dart run flutter_launcher_icons

      # --- Windows: MSIX installer, signed with the self-signed cert ---
      - if: matrix.target == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          # Derive the 4-part MSIX version from pubspec's single source of truth
          # (`version: X.Y.Z+B` -> `X.Y.Z.B`). The pubspec `msix_version` field is
          # a stale fallback; passing --version here guarantees the package version
          # increases each release so Windows performs an in-place update instead of
          # rejecting a same-version/different-content package (0x80073CFB).
          $raw = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches[0].Groups[1].Value.Trim()
          $parts = $raw -split '\+'
          $build = if ($parts.Count -gt 1) { $parts[1] } else { '0' }
          $msixVer = "$($parts[0]).$build"
          Write-Host "MSIX version: $msixVer (from pubspec '$raw')"
          # Inject cloud credentials into the underlying `flutter build windows`.
          $defs = "--dart-define=SUPABASE_URL=$($env:SUPABASE_URL) --dart-define=SUPABASE_ANON_KEY=$($env:SUPABASE_ANON_KEY)"
          if ($env:WINDOWS_CERT_BASE64) {
            $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
            dart run msix:create --version $msixVer --windows-build-args "$defs" --certificate-path $pfx --certificate-password $env:WINDOWS_CERT_PASSWORD
          } else {
            Write-Host 'No signing secret; building with msix test certificate.'
            dart run msix:create --version $msixVer --windows-build-args "$defs"
          }
      - if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/windows/x64/runner/Release/*.msix dist/ -ErrorAction SilentlyContinue
          if (-not (Test-Path dist/*.msix)) { Compress-Archive build/windows/x64/runner/Release/* dist/kerminal-windows.zip }
          # Publish the public cert so users can trust it once (Trusted People).
          Copy-Item windows/kerminal-codesign.cer dist/ -ErrorAction SilentlyContinue

      # --- macOS: .app bundle (zip). DMG needs signing/notarization (see DEPLOY.md) ---
      - if: matrix.target == 'macos'
        run: |
          flutter build macos --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          mkdir -p dist
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/dist/kerminal-macos.zip" kerminal.app

      # --- Linux: bundle tarball ---
      - if: matrix.target == 'linux'
        run: |
          flutter build linux --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          mkdir -p dist
          tar -czf dist/kerminal-linux-x64.tar.gz -C build/linux/x64/release/bundle .

      # --- Android: APK + AAB (debug-signed unless key.properties provided) ---
      - if: matrix.target == 'android'
        run: |
          DEFS="--dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          flutter build apk --release $DEFS
          flutter build appbundle --release $DEFS
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/kerminal.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/kerminal.aab

      # --- Web: static bundle ---
      - if: matrix.target == 'web'
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          mkdir -p dist
          tar -czf dist/kerminal-web.tar.gz -C build/web .

      - uses: actions/upload-artifact@v4
        with:
          name: kerminal-${{ matrix.target }}
          path: dist/*

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Generate the update manifest describing THIS release. The app polls
      # releases/latest/download/latest.json, so older versions detect it.
      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Kerminal ${VERSION}. See the release page for details.",
            "downloads": {
              "windows": "${BASE}/kerminal.msix",
              "macos": "${BASE}/kerminal-macos.zip",
              "linux": "${BASE}/kerminal-linux-x64.tar.gz",
              "android": "${BASE}/kerminal.apk"
            }
          }
          EOF
          cat latest.json

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json
